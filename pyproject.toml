[project]
name = "dreamai"
version = "3.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12, <3.13"
dependencies = [
    "notebook>=7.2.1",
    "ipython>=8.26.0",
    "ipywidgets>=8.1.5",
    "ruff>=0.6.2",
    "burr>=0.28.0",
    "instructor>=1.4.0",
    "anthropic>=0.34.1",
    "openai>=1.42.0",
    "lancedb>=0.12.0",
    "demoji>=1.1.0",
    "google-generativeai>=0.7.2",
    "python-dotenv>=1.0.1",
    "pymupdf4llm>=0.0.12",
    "pydantic-settings>=2.4.0",
    "lxml>=5.3.0",
    "duckduckgo-search>=6.2.11",
    "html2text>=2024.2.26",
    "trafilatura>=1.12.1",
    "pandas>=2.2.2",
    "fastapi>=0.112.2",
    "fastcore>=1.7.1",
    "termcolor>=2.4.0",
    "google-auth-oauthlib>=1.2.1",
    "python-fasthtml>=0.4.5",
    "sentence-transformers>=3.0.1",
    "tantivy>=0.22.0",
    "graphviz>=0.20.3",
]

[tool.ruff]
line-length = 95

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
